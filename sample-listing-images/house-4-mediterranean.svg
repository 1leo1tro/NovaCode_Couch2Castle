  <circle cx="400" cy="355" r="7" fill="none" stroke="#B8860B" stroke-width="2.5"/>

  <!-- Clay tile roof - left wing -->
  <polygon points="90,205 300,125 300,205" fill="#C2512A"/>
  <!-- Tile rows -->
  <line x1="90" y1="195" x2="300" y2="138" stroke="#a84020" stroke-width="2"/>
  <line x1="90" y1="185" x2="300" y2="151" stroke="#a84020" stroke-width="2"/>
  <line x1="90" y1="175" x2="300" y2="163" stroke="#a84020" stroke-width="2"/>
  <line x1="132" y1="205" x2="300" y2="125" stroke="#a84020" stroke-width="1.5"/>
  <line x1="174" y1="205" x2="300" y2="125" stroke="#a84020" stroke-width="1.5"/>
  <line x1="216" y1="205" x2="300" y2="125" stroke="#a84020" stroke-width="1.5"/>
  <line x1="258" y1="205" x2="300" y2="125" stroke="#a84020" stroke-width="1.5"/>

  <!-- Clay tile roof - right wing -->
  <polygon points="500,125 710,205 500,205" fill="#C2512A"/>
  <line x1="500" y1="138" x2="710" y2="195" stroke="#a84020" stroke-width="2"/>
  <line x1="500" y1="151" x2="710" y2="185" stroke="#a84020" stroke-width="2"/>
  <line x1="500" y1="163" x2="710" y2="175" stroke="#a84020" stroke-width="2"/>
  <line x1="500" y1="125" x2="542" y2="205" stroke="#a84020" stroke-width="1.5"/>
  <line x1="500" y1="125" x2="584" y2="205" stroke="#a84020" stroke-width="1.5"/>
  <line x1="500" y1="125" x2="626" y2="205" stroke="#a84020" stroke-width="1.5"/>
  <line x1="500" y1="125" x2="668" y2="205" stroke="#a84020" stroke-width="1.5"/>

