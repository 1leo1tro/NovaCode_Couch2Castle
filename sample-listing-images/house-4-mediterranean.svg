  <line x1="90" y1="362" x2="330" y2="362" stroke="#c4a86a" stroke-width="1.5"/>
  <line x1="90" y1="382" x2="330" y2="382" stroke="#c4a86a" stroke-width="1.5"/>
  <line x1="90" y1="402" x2="330" y2="402" stroke="#c4a86a" stroke-width="1.5"/>
  <line x1="210" y1="340" x2="210" y2="405" stroke="#c4a86a" stroke-width="1.5"/>
  <circle cx="150" cy="380" r="4" fill="#9a8050"/>
  <circle cx="270" cy="380" r="4" fill="#9a8050"/>

  <!-- Steps to front door -->
  <rect x="330" y="398" width="140" height="10" fill="#D4A870"/>
  <rect x="338" y="388" width="124" height="12" fill="#E0B880"/>

  <!-- Palm trees -->
  <rect x="55" y="310" width="10" height="95" fill="#8B6B4A" style="transform: rotate(-3deg); transform-origin: 60px 405px"/>
  <!-- Palm fronds -->
  <ellipse cx="60" cy="308" rx="4" ry="35" fill="#4aaa30" transform="rotate(-60,60,308)"/>
  <ellipse cx="60" cy="308" rx="4" ry="35" fill="#3a9a28" transform="rotate(-30,60,308)"/>
  <ellipse cx="60" cy="308" rx="4" ry="35" fill="#4aaa30" transform="rotate(0,60,308)"/>
  <ellipse cx="60" cy="308" rx="4" ry="35" fill="#3a9a28" transform="rotate(30,60,308)"/>
  <ellipse cx="60" cy="308" rx="4" ry="35" fill="#4aaa30" transform="rotate(60,60,308)"/>
  <ellipse cx="60" cy="308" rx="4" ry="35" fill="#3a9a28" transform="rotate(90,60,308)"/>

  <rect x="745" y="305" width="10" height="100" fill="#8B6B4A" style="transform: rotate(4deg); transform-origin: 750px 405px"/>
  <ellipse cx="750" cy="303" rx="4" ry="35" fill="#4aaa30" transform="rotate(-60,750,303)"/>
  <ellipse cx="750" cy="303" rx="4" ry="35" fill="#3a9a28" transform="rotate(-30,750,303)"/>
  <ellipse cx="750" cy="303" rx="4" ry="35" fill="#4aaa30" transform="rotate(0,750,303)"/>
  <ellipse cx="750" cy="303" rx="4" ry="35" fill="#3a9a28" transform="rotate(30,750,303)"/>
  <ellipse cx="750" cy="303" rx="4" ry="35" fill="#4aaa30" transform="rotate(60,750,303)"/>
  <ellipse cx="750" cy="303" rx="4" ry="35" fill="#3a9a28" transform="rotate(90,750,303)"/>

  <!-- Fountain -->
  <ellipse cx="400" cy="430" rx="35" ry="15" fill="#4a90aa" opacity="0.7"/>
  <ellipse cx="400" cy="428" rx="30" ry="12" fill="#5aaabb" opacity="0.6"/>
  <rect x="396" y="410" width="8" height="20" fill="#c8b090"/>
  <ellipse cx="400" cy="408" rx="10" ry="5" fill="#c8b090"/>

  <!-- Label -->
  <rect x="0" y="490" width="800" height="43" fill="rgba(100,50,0,0.65)"/>
  <text x="400" y="518" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Mediterranean Estate · 5 Bed · 3.5 Bath · 3-Car Garage</text>
</svg>
