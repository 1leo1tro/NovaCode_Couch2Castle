  <rect x="108" y="236" width="62" height="84" fill="none" stroke="#D4A870" stroke-width="4" rx="31 31 0 0"/>
  <!-- Wrought iron grille -->
  <line x1="139" y1="236" x2="139" y2="320" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="108" y1="275" x2="170" y2="275" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="118" y1="255" x2="118" y2="320" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="160" y1="255" x2="160" y2="320" stroke="#2a2a2a" stroke-width="1.5"/>

  <rect x="188" y="238" width="58" height="80" fill="#5a8fb8" rx="29 29 0 0" opacity="0.8"/>
  <rect x="186" y="236" width="62" height="84" fill="none" stroke="#D4A870" stroke-width="4" rx="31 31 0 0"/>
  <line x1="217" y1="236" x2="217" y2="320" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="186" y1="275" x2="248" y2="275" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="196" y1="255" x2="196" y2="320" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="238" y1="255" x2="238" y2="320" stroke="#2a2a2a" stroke-width="1.5"/>

