  <rect x="554" y="238" width="58" height="80" fill="#5a8fb8" rx="29 29 0 0" opacity="0.8"/>
  <rect x="552" y="236" width="62" height="84" fill="none" stroke="#D4A870" stroke-width="4" rx="31 31 0 0"/>
  <line x1="583" y1="236" x2="583" y2="320" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="552" y1="275" x2="614" y2="275" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="562" y1="255" x2="562" y2="320" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="604" y1="255" x2="604" y2="320" stroke="#2a2a2a" stroke-width="1.5"/>

  <rect x="632" y="238" width="58" height="80" fill="#5a8fb8" rx="29 29 0 0" opacity="0.8"/>
  <rect x="630" y="236" width="62" height="84" fill="none" stroke="#D4A870" stroke-width="4" rx="31 31 0 0"/>
  <line x1="661" y1="236" x2="661" y2="320" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="630" y1="275" x2="692" y2="275" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="640" y1="255" x2="640" y2="320" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="682" y1="255" x2="682" y2="320" stroke="#2a2a2a" stroke-width="1.5"/>

