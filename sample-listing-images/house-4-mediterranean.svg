  <rect x="295" y="118" width="210" height="20" fill="url(#stucco)"/>
  <rect x="295" y="112" width="210" height="12" fill="#C2512A"/>
  <!-- Decorative dentils -->
  <rect x="300" y="120" width="14" height="18" fill="#D4A870"/>
  <rect x="322" y="120" width="14" height="18" fill="#D4A870"/>
  <rect x="344" y="120" width="14" height="18" fill="#D4A870"/>
  <rect x="366" y="120" width="14" height="18" fill="#D4A870"/>
  <rect x="388" y="120" width="14" height="18" fill="#D4A870"/>
  <rect x="410" y="120" width="14" height="18" fill="#D4A870"/>
  <rect x="432" y="120" width="14" height="18" fill="#D4A870"/>
  <rect x="454" y="120" width="14" height="18" fill="#D4A870"/>
  <rect x="476" y="120" width="14" height="18" fill="#D4A870"/>

