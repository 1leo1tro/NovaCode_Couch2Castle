<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" width="800" height="533">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e90ff"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
    <linearGradient id="stucco" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5DEB3"/>
      <stop offset="100%" stop-color="#E8C88A"/>
    </linearGradient>
    <linearGradient id="lawn4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ab840"/>
      <stop offset="100%" stop-color="#5a9030"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="533" fill="url(#sky4)"/>

  <!-- Sun -->
  <circle cx="100" cy="80" r="55" fill="#FFE566" opacity="0.9"/>

  <!-- Light clouds -->
  <ellipse cx="350" cy="60" rx="80" ry="28" fill="white" opacity="0.85"/>
  <ellipse cx="400" cy="48" rx="60" ry="25" fill="white" opacity="0.85"/>
  <ellipse cx="310" cy="55" rx="50" ry="20" fill="white" opacity="0.85"/>
  <ellipse cx="620" cy="90" rx="65" ry="22" fill="white" opacity="0.75"/>
  <ellipse cx="665" cy="78" rx="48" ry="20" fill="white" opacity="0.75"/>

  <!-- Ground / lawn -->
  <rect x="0" y="400" width="800" height="133" fill="url(#lawn4)"/>

  <!-- Stone/concrete driveway -->
  <polygon points="330,400 470,400 520,533 280,533" fill="#c8b89a"/>

  <!-- Main house body (stucco) -->
  <rect x="90" y="200" width="620" height="205" fill="url(#stucco)"/>

  <!-- Arch entry arch -->
  <rect x="348" y="270" width="104" height="135" fill="#D4A870" rx="52 52 0 0"/>
  <rect x="356" y="340" width="88" height="65" fill="#D4A870"/>

  <!-- Front door inside arch -->
  <rect x="362" y="305" width="76" height="100" fill="#6B3A2A" rx="38 38 0 0"/>
