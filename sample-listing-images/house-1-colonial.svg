<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" width="800" height="533">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F4FF"/>
    </linearGradient>
    <linearGradient id="lawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a9e3a"/>
      <stop offset="100%" stop-color="#3d7a26"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="533" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="680" cy="80" r="50" fill="#FFD700" opacity="0.85"/>

  <!-- Clouds -->
  <ellipse cx="150" cy="90" rx="70" ry="30" fill="white" opacity="0.9"/>
  <ellipse cx="200" cy="75" rx="50" ry="28" fill="white" opacity="0.9"/>
  <ellipse cx="110" cy="80" rx="45" ry="22" fill="white" opacity="0.9"/>

  <ellipse cx="500" cy="110" rx="60" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="545" cy="98" rx="45" ry="22" fill="white" opacity="0.8"/>
  <ellipse cx="465" cy="102" rx="40" ry="20" fill="white" opacity="0.8"/>

  <!-- Lawn -->
  <rect x="0" y="390" width="800" height="143" fill="url(#lawn)"/>

  <!-- Driveway -->
  <polygon points="370,390 430,390 480,533 320,533" fill="#c8b89a"/>
  <line x1="400" y1="390" x2="400" y2="533" stroke="#b0a08a" stroke-width="2" stroke-dasharray="12,10"/>

  <!-- House main body -->
  <rect x="140" y="230" width="520" height="165" fill="#F5F0E8"/>
  <!-- Brick texture lines -->
  <line x1="140" y1="260" x2="660" y2="260" stroke="#e0d5c5" stroke-width="1"/>
  <line x1="140" y1="290" x2="660" y2="290" stroke="#e0d5c5" stroke-width="1"/>
  <line x1="140" y1="320" x2="660" y2="320" stroke="#e0d5c5" stroke-width="1"/>
  <line x1="140" y1="350" x2="660" y2="350" stroke="#e0d5c5" stroke-width="1"/>
  <line x1="140" y1="380" x2="660" y2="380" stroke="#e0d5c5" stroke-width="1"/>

  <!-- Roof -->
  <polygon points="100,235 400,100 700,235" fill="#7A3B2E"/>
  <!-- Roof shingles detail -->
  <polygon points="100,235 400,100 700,235 700,220 400,88 100,220" fill="#8B4436"/>
  <line x1="250" y1="168" x2="400" y2="100" stroke="#6a2f22" stroke-width="2"/>
  <line x1="400" y1="100" x2="550" y2="168" stroke="#6a2f22" stroke-width="2"/>
  <line x1="175" y1="200" x2="400" y2="100" stroke="#6a2f22" stroke-width="1.5"/>
  <line x1="400" y1="100" x2="625" y2="200" stroke="#6a2f22" stroke-width="1.5"/>

  <!-- Chimney -->
  <rect x="510" y="115" width="45" height="90" fill="#8B6355"/>
  <rect x="505" y="110" width="55" height="12" fill="#6a4a3a"/>

  <!-- Garage -->
  <rect x="140" y="280" width="160" height="115" fill="#E8E2D5"/>
  <rect x="140" y="275" width="160" height="8" fill="#C8B89A"/>
  <!-- Garage door panels -->
  <rect x="148" y="290" width="144" height="95" fill="#D5CFC2" rx="2"/>
  <line x1="148" y1="320" x2="292" y2="320" stroke="#bbb4a5" stroke-width="1.5"/>
  <line x1="148" y1="350" x2="292" y2="350" stroke="#bbb4a5" stroke-width="1.5"/>
  <line x1="148" y1="380" x2="292" y2="380" stroke="#bbb4a5" stroke-width="1.5"/>
  <line x1="220" y1="290" x2="220" y2="385" stroke="#bbb4a5" stroke-width="1.5"/>
  <circle cx="220" cy="352" r="4" fill="#a09080"/>

  <!-- Front door -->
  <rect x="360" y="300" width="80" height="95" fill="#5C3D2E" rx="3"/>
  <rect x="367" y="308" width="28" height="35" fill="#7a5244" rx="1"/>
  <rect x="405" y="308" width="28" height="35" fill="#7a5244" rx="1"/>
  <rect x="367" y="352" width="66" height="35" fill="#7a5244" rx="1"/>
  <circle cx="437" cy="365" r="4" fill="#D4AF37"/>
  <!-- Door transom -->
  <rect x="360" y="288" width="80" height="14" fill="#7a5244" rx="2"/>

  <!-- Windows -->
  <!-- Left window -->
  <rect x="195" y="245" width="70" height="55" fill="#AED6F1" rx="2"/>
  <rect x="193" y="243" width="74" height="59" fill="none" stroke="#C8B89A" stroke-width="3" rx="2"/>
  <line x1="230" y1="243" x2="230" y2="302" stroke="#C8B89A" stroke-width="2"/>
  <line x1="193" y1="271" x2="267" y2="271" stroke="#C8B89A" stroke-width="2"/>

  <!-- Right window 1 -->
  <rect x="460" y="245" width="70" height="55" fill="#AED6F1" rx="2"/>
  <rect x="458" y="243" width="74" height="59" fill="none" stroke="#C8B89A" stroke-width="3" rx="2"/>
  <line x1="495" y1="243" x2="495" y2="302" stroke="#C8B89A" stroke-width="2"/>
  <line x1="458" y1="271" x2="532" y2="271" stroke="#C8B89A" stroke-width="2"/>

  <!-- Right window 2 -->
  <rect x="560" y="245" width="70" height="55" fill="#AED6F1" rx="2"/>
  <rect x="558" y="243" width="74" height="59" fill="none" stroke="#C8B89A" stroke-width="3" rx="2"/>
  <line x1="595" y1="243" x2="595" y2="302" stroke="#C8B89A" stroke-width="2"/>
  <line x1="558" y1="271" x2="632" y2="271" stroke="#C8B89A" stroke-width="2"/>

  <!-- Shutters -->
  <rect x="185" y="243" width="12" height="59" fill="#5C3D2E" rx="1"/>
  <rect x="269" y="243" width="12" height="59" fill="#5C3D2E" rx="1"/>
  <rect x="448" y="243" width="12" height="59" fill="#5C3D2E" rx="1"/>
  <rect x="532" y="243" width="12" height="59" fill="#5C3D2E" rx="1"/>
  <rect x="548" y="243" width="12" height="59" fill="#5C3D2E" rx="1"/>
  <rect x="632" y="243" width="12" height="59" fill="#5C3D2E" rx="1"/>

  <!-- Porch columns -->
  <rect x="340" y="250" width="12" height="145" fill="#F0EBE0"/>
  <rect x="448" y="250" width="12" height="145" fill="#F0EBE0"/>
  <!-- Column caps -->
  <rect x="335" y="247" width="22" height="6" fill="#D8D0C0"/>
  <rect x="443" y="247" width="22" height="6" fill="#D8D0C0"/>

  <!-- Porch roof -->
  <rect x="325" y="240" width="150" height="12" fill="#8B4436"/>

  <!-- Steps -->
  <rect x="345" y="390" width="110" height="10" fill="#C8B89A"/>
  <rect x="355" y="380" width="90" height="10" fill="#D5CFC2"/>

  <!-- Mailbox -->
  <rect x="285" y="365" width="22" height="16" fill="#4a6a8a" rx="2"/>
  <rect x="295" y="355" width="4" height="12" fill="#6a7a8a"/>

  <!-- Trees -->
  <rect x="65" y="310" width="12" height="80" fill="#7a5a3a"/>
  <ellipse cx="71" cy="295" rx="45" ry="55" fill="#3d7a26"/>
  <ellipse cx="58" cy="285" rx="30" ry="40" fill="#4a8a30"/>

  <rect x="710" y="320" width="12" height="70" fill="#7a5a3a"/>
  <ellipse cx="716" cy="305" rx="40" ry="48" fill="#3d7a26"/>
  <ellipse cx="728" cy="295" rx="28" ry="38" fill="#4a8a30"/>

  <!-- Shrubs -->
  <ellipse cx="160" cy="392" rx="28" ry="18" fill="#4a8a30"/>
  <ellipse cx="205" cy="390" rx="22" ry="15" fill="#3d7a26"/>
  <ellipse cx="620" cy="392" rx="28" ry="18" fill="#4a8a30"/>
  <ellipse cx="660" cy="390" rx="22" ry="15" fill="#3d7a26"/>

  <!-- Address plaque -->
  <rect x="390" y="340" width="20" height="14" fill="#D4AF37" rx="2"/>

  <!-- Label -->
  <rect x="0" y="490" width="800" height="43" fill="rgba(0,0,0,0.45)"/>
  <text x="400" y="518" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Colonial Style Home · 4 Bed · 2.5 Bath</text>
</svg>
